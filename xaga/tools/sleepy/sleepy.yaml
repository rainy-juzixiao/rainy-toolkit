output_dir: path/to/docs/api
lang: chinese

ignored_namespaces:
  - implements
  - detail
  - impl

sources:
  - name: my_library
    include_dirs:
      - include/
    extensions:
      - h
      - hpp
      - hxx
    compile_flags:
      std: c++20
      defines:
        - FOO_VERSION=1
      includes:
        - third_party/include
      extra:
        - -Wno-pragma-once-outside-header
    files: []

  - name: core_headers
    include_dirs:
      - include/core/
    extensions:
      - hpp
    compile_flags:
      std: c++23
      defines: []
      includes: []
      extra: []
    files:
      - include/core/typeinfo.hpp
