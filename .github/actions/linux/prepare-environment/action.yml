name: Prepare Environment
description: Install build dependencies for Linux CI

inputs:
  runner:
    required: true
    description: Runner name
  arch:
    required: true
    description: Target architecture

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt update
        sudo add-apt-repository universe
        sudo apt update
        sudo apt install -y \
          build-essential \
          cmake \
          ninja-build \
          git \
          ca-certificates \
          pkg-config \
          software-properties-common \
          liburing-dev \
          liburing2
        sudo apt install -y gcc-13 g++-13
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
        sudo apt install -y \
          locales \
          locales-all \
          language-pack-en \
          language-pack-zh-hans \
          language-pack-ja \
          language-pack-fr \
          language-pack-de
        sudo locale-gen en_US.UTF-8 zh_CN.UTF-8 ja_JP.UTF-8 fr_FR.UTF-8 de_DE.UTF-8
        
        gcc --version
        g++ --version
        cmake --version