name: MacOS-X86_64-Test

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch: # Test only

jobs:
  x86_64:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Say Hello
        run: echo "Hello World"

      - name: Display System Infomation
        run: |
          echo "Current System: $(sw_vers -productName)"
          echo "Version: $(sw_vers -productVersion)"
          echo "Hostname: $(hostname)"

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: |
          cmake --build build -j$(nproc)