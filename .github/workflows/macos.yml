name: MacOS-Test

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.arch }} - ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (ARM64)
          - arch: arm64
            os: macOS-latest
            runner: macos-latest
          # Intel (x86_64)
          - arch: x86_64
            os: macOS-15-intel
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=RELEASE -G Ninja

      - name: Build
        run: |
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run Tests
        run: |
          ctest --test-dir build --output-on-failure