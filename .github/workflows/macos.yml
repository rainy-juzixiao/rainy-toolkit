name: MacOS-Test

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.arch }} - ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (ARM64)
          - arch: arm64
            os: macOS-latest
            runner: macos-latest

          # Intel (x86_64)
          - arch: x86_64
            os: macOS-13
            runner: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Print Architecture
        run: |
          echo "Target Arch: ${{ matrix.arch }}"
          uname -m

      - name: Display System Information
        run: |
          echo "System: $(sw_vers -productName)"
          echo "Version: $(sw_vers -productVersion)"
          echo "Kernel: $(uname -a)"
          echo "CPU: $(sysctl -n machdep.cpu.brand_string || echo 'Apple Silicon')"

      - name: Configure CMake
        run: |
          cmake -S . -B build

      - name: Build
        run: |
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          ctest --test-dir build --output-on-failure