name: Windows [CI Test]

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.arch }} - ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !github.event.pull_request)
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: Windows 11 Arm64
            runner: windows-11-arm
          - arch: x64
            os: Windows 11
            runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest

      - name: Configure WER LocalDumps
        shell: pwsh
        run: |
          $dumpDir = "${{ runner.temp }}\crash-dumps"
          New-Item -ItemType Directory -Force -Path $dumpDir | Out-Null

          $regPath = "HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps"
          New-Item -Path $regPath -Force | Out-Null
          Set-ItemProperty -Path $regPath -Name "DumpFolder"  -Value $dumpDir -Type ExpandString
          Set-ItemProperty -Path $regPath -Name "DumpCount"   -Value 64        -Type DWord
          Set-ItemProperty -Path $regPath -Name "DumpType"    -Value 2         -Type DWord

          Write-Host "WER LocalDumps configured → $dumpDir"

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Check for crash dumps
        if: always()
        id: check-dumps
        shell: pwsh
        run: |
          $dumpDir = "${{ runner.temp }}\crash-dumps"
          $dumps = Get-ChildItem -Path $dumpDir -Filter "*.dmp" -ErrorAction SilentlyContinue

          if ($dumps.Count -gt 0) {
            Write-Host "Found $($dumps.Count) dump file(s):"
            $dumps | ForEach-Object { Write-Host "  $_" }
            echo "found=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No crash dumps found."
            echo "found=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install GPG
        if: always() && steps.check-dumps.outputs.found == 'true'
        shell: pwsh
        run: |
          # windows-latest 上 Gpg4win 通常已预装，先检查
          if (Get-Command gpg -ErrorAction SilentlyContinue) {
            Write-Host "GPG already available: $(gpg --version | Select-Object -First 1)"
          } else {
            Write-Host "Installing Gpg4win via winget..."
            winget install --id GnuPG.Gpg4win --silent --accept-source-agreements --accept-package-agreements
            # 刷新 PATH
            $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + $env:PATH
            Write-Host "GPG installed: $(gpg --version | Select-Object -First 1)"
          }

      - name: Import GPG public key
        if: always() && steps.check-dumps.outputs.found == 'true'
        shell: pwsh
        env:
          DEBUG_DUMP_PUBKEY: ${{ secrets.DEBUG_DUMP_PUBKEY }}
        run: |
          # 把 secret 写到临时文件再导入，避免命令行参数泄漏
          $keyFile = "${{ runner.temp }}\dump_pubkey.asc"
          $env:DEBUG_DUMP_PUBKEY | Set-Content -Path $keyFile -Encoding UTF8
          gpg --batch --import $keyFile
          Remove-Item $keyFile -Force

          # 列出导入结果，顺便抓出 Key ID 供后续加密使用
          $keyInfo = gpg --list-keys --with-colons | `
            Where-Object { $_ -match "^pub" } | `
            Select-Object -First 1
          $keyId = ($keyInfo -split ":")[4]
          Write-Host "Imported key ID: $keyId"
          echo "gpg_key_id=$keyId" >> $env:GITHUB_OUTPUT
        id: import-key

      - name: Collect and encrypt crash dumps
        if: always() && steps.check-dumps.outputs.found == 'true'
        shell: pwsh
        run: |
          $dumpDir    = "${{ runner.temp }}\crash-dumps"
          $stagingDir = "${{ runner.temp }}\dump-report"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null

          # ── 1. 基本元数据报告 ──
          $report = [ordered]@{
            workflow    = "${{ github.workflow }}"
            run_id      = "${{ github.run_id }}"
            run_number  = "${{ github.run_number }}"
            sha         = "${{ github.sha }}"
            ref         = "${{ github.ref }}"
            actor       = "${{ github.actor }}"
            arch        = "${{ matrix.arch }}"
            os          = "${{ matrix.os }}"
            runner_os   = $env:RUNNER_OS
            timestamp   = (Get-Date -Format "o")
            dumps       = @()
          }

          # ── 2. 逐个处理 dump 文件 ──
          $keyId = "${{ steps.import-key.outputs.gpg_key_id }}"
          Get-ChildItem -Path $dumpDir -Filter "*.dmp" | ForEach-Object {
            $dump = $_
            $encFile = Join-Path $stagingDir "$($dump.BaseName).dmp.gpg"

            # 对每个 dump 单独加密
            gpg --batch --yes `
                --trust-model always `
                --recipient $keyId `
                --output $encFile `
                --encrypt $dump.FullName

            $report.dumps += [ordered]@{
              filename      = $dump.Name
              encrypted_as  = [System.IO.Path]::GetFileName($encFile)
              size_bytes    = $dump.Length
              last_write    = $dump.LastWriteTimeUtc.ToString("o")
            }

            Write-Host "Encrypted: $($dump.Name) → $([System.IO.Path]::GetFileName($encFile))"
          }

          # ── 3. 写入并加密 JSON 报告 ──
          $jsonPath    = "${{ runner.temp }}\crash_report.json"
          $jsonEncPath = Join-Path $stagingDir "crash_report.json.gpg"
          $report | ConvertTo-Json -Depth 5 | Set-Content -Path $jsonPath -Encoding UTF8

          gpg --batch --yes `
              --trust-model always `
              --recipient $keyId `
              --output $jsonEncPath `
              --encrypt $jsonPath

          Remove-Item $jsonPath -Force
          Write-Host "Report written and encrypted."

          # ── 4. 输出 staging 目录内容 ──
          Write-Host "`nFiles to upload:"
          Get-ChildItem $stagingDir | ForEach-Object { Write-Host "  $($_.Name)  ($($_.Length) bytes)" }

      - name: Upload encrypted crash dumps
        if: always() && steps.check-dumps.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: crash-dumps-encrypted-${{ matrix.arch }}-${{ github.run_id }}
          path: ${{ runner.temp }}/dump-report/
          # Artifact 默认保留 90 天，建议设短一些
          retention-days: 30
          if-no-files-found: warn

      - name: Clean up GPG keyring
        if: always() && steps.check-dumps.outputs.found == 'true'
        shell: pwsh
        run: |
          $keyId = "${{ steps.import-key.outputs.gpg_key_id }}"
          if ($keyId) {
            gpg --batch --yes --delete-keys $keyId 2>$null || true
            Write-Host "GPG key $keyId removed from runner keyring."
          }