name: Windows [CI Test]

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.arch }} - ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !github.event.pull_request)
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: Windows 11 Arm64
            runner: windows-11-arm
            vcpkg_triplet: arm64-windows
          - arch: x64
            os: Windows 11
            runner: windows-latest
            vcpkg_triplet: x64-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest

      - name: Setup vcpkg
        id: vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "${{ runner.temp }}\vcpkg"
          & "${{ runner.temp }}\vcpkg\bootstrap-vcpkg.bat" -disableMetrics

          "VCPKG_ROOT=${{ runner.temp }}\vcpkg" >> $env:GITHUB_ENV
          "${{ runner.temp }}\vcpkg" >> $env:GITHUB_PATH

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\vcpkg\installed
          key: vcpkg-${{ matrix.vcpkg_triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.vcpkg_triplet }}-

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          vcpkg install --triplet ${{ matrix.vcpkg_triplet }} `
            --vcpkg-root "$env:VCPKG_ROOT" `
            --x-manifest-root "${{ github.workspace }}"

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}

      - name: Build
        id: build
        continue-on-error: true
        run: cmake --build build --config Debug --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure