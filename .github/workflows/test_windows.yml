name: Windows CMake Test

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.arch }} - ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: windows-11-arm
            runner: windows-11-arm
          - arch: x64
            os: windows-latest
            runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest

      - name: Configure CMake
        run: |
          if ("${{ matrix.arch }}" -eq "arm64") {
            cmake -S . -B build -A arm64 -G "Visual Studio 17 2022"
          } else {
            cmake -S . -B build -A x64 -G "Visual Studio 17 2022"
          }
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure