name: Windows [CI Test]

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.arch }} - ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !github.event.pull_request)
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: Windows 11 Arm64
            runner: windows-11-arm
          - arch: x64
            os: Windows 11
            runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest

      - name: Install procdump and register as JIT debugger
        shell: pwsh
        run: |
          $dumpDir = "${{ runner.temp }}\crash-dumps"
          New-Item -ItemType Directory -Force -Path $dumpDir | Out-Null

          $procdumpDir = "${{ runner.temp }}\procdump"
          New-Item -ItemType Directory -Force -Path $procdumpDir | Out-Null
          Invoke-WebRequest -Uri "https://download.sysinternals.com/files/Procdump.zip" `
            -OutFile "$procdumpDir\Procdump.zip"
          Expand-Archive -Path "$procdumpDir\Procdump.zip" -DestinationPath $procdumpDir -Force

          Write-Host "Files in procdump zip:"
          Get-ChildItem $procdumpDir | ForEach-Object { Write-Host "  $($_.Name)" }

          if ("${{ matrix.arch }}" -eq "arm64") {
            $procdumpExe = Get-ChildItem $procdumpDir -Filter "procdump64a.exe" |
                           Select-Object -First 1 -ExpandProperty FullName
            if (-not $procdumpExe) {
              $procdumpExe = Get-ChildItem $procdumpDir -Filter "procdump*.exe" |
                             Select-Object -First 1 -ExpandProperty FullName
            }
          } else {
            $procdumpExe = Get-ChildItem $procdumpDir -Filter "procdump64.exe" |
                           Select-Object -First 1 -ExpandProperty FullName
            if (-not $procdumpExe) {
              $procdumpExe = Get-ChildItem $procdumpDir -Filter "procdump*.exe" |
                             Select-Object -First 1 -ExpandProperty FullName
            }
          }

          if (-not $procdumpExe) {
            Write-Error "Could not find procdump executable in $procdumpDir"
            exit 1
          }
          Write-Host "Using procdump: $procdumpExe"

          echo "$procdumpDir" >> $env:GITHUB_PATH

          $debuggerCmd = "`"$procdumpExe`" -accepteula -e 1 -ma `"$dumpDir\crash_%e_%p_%t`" %ld"

          foreach ($regPath in @(
            "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\AeDebug",
            "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows NT\CurrentVersion\AeDebug"
          )) {
            if (-not (Test-Path $regPath)) {
              New-Item -Path $regPath -Force | Out-Null
            }
            Set-ItemProperty -Path $regPath -Name "Debugger" -Value $debuggerCmd
            Set-ItemProperty -Path $regPath -Name "Auto"     -Value "1" -Type String
          }

          Write-Host "AeDebug JIT debugger registered → dumps go to $dumpDir"

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        id: build
        continue-on-error: true
        run: cmake --build build --config Debug --parallel

      - name: Run tests
        id: test
        continue-on-error: true
        if: steps.build.outcome == 'success'
        run: ctest --test-dir build --output-on-failure

      - name: Check for crash dumps
        if: always()
        id: check-dumps
        shell: pwsh
        run: |
          $dumpDir = "${{ runner.temp }}\crash-dumps"
          Start-Sleep -Seconds 3
          $dumps = Get-ChildItem -Path $dumpDir -Filter "*.dmp" -ErrorAction SilentlyContinue

          if ($dumps -and $dumps.Count -gt 0) {
            Write-Host "Found $($dumps.Count) dump file(s):"
            $dumps | ForEach-Object { Write-Host "  $($_.Name)  ($($_.Length) bytes)" }
            "found=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No crash dumps found."
            "found=false" >> $env:GITHUB_OUTPUT
          }

      - name: Import GPG public key
        if: always() && steps.check-dumps.outputs.found == 'true'
        id: import-key
        shell: pwsh
        env:
          DEBUG_DUMP_PUBKEY: ${{ secrets.DEBUG_DUMP_PUBKEY }}
        run: |
          $keyFile = "${{ runner.temp }}\dump_pubkey.asc"
          $env:DEBUG_DUMP_PUBKEY | Set-Content -Path $keyFile -Encoding UTF8
          gpg --batch --import $keyFile
          Remove-Item $keyFile -Force

          $keyId = (gpg --list-keys --with-colons |
            Where-Object { $_ -match "^pub" } |
            Select-Object -First 1) -split ":" | Select-Object -Index 4

          Write-Host "Imported GPG key: $keyId"
          "gpg_key_id=$keyId" >> $env:GITHUB_OUTPUT

      - name: Collect and encrypt crash dumps
        if: always() && steps.check-dumps.outputs.found == 'true'
        shell: pwsh
        run: |
          $dumpDir    = "${{ runner.temp }}\crash-dumps"
          $stagingDir = "${{ runner.temp }}\dump-report"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          $keyId = "${{ steps.import-key.outputs.gpg_key_id }}"

          $report = [ordered]@{
            workflow      = "${{ github.workflow }}"
            run_id        = "${{ github.run_id }}"
            run_number    = "${{ github.run_number }}"
            sha           = "${{ github.sha }}"
            ref           = "${{ github.ref }}"
            actor         = "${{ github.actor }}"
            arch          = "${{ matrix.arch }}"
            os            = "${{ matrix.os }}"
            timestamp     = (Get-Date -Format "o")
            build_outcome = "${{ steps.build.outcome }}"
            test_outcome  = "${{ steps.test.outcome }}"
            dumps         = @()
          }

          Get-ChildItem -Path $dumpDir -Filter "*.dmp" | ForEach-Object {
            $encFile = Join-Path $stagingDir "$($_.BaseName).dmp.gpg"
            gpg --batch --yes --trust-model always `
                --recipient $keyId --output $encFile --encrypt $_.FullName
            $report.dumps += [ordered]@{
              filename     = $_.Name
              encrypted_as = [IO.Path]::GetFileName($encFile)
              size_bytes   = $_.Length
              last_write   = $_.LastWriteTimeUtc.ToString("o")
            }
            Write-Host "Encrypted: $($_.Name) → $([IO.Path]::GetFileName($encFile))"
          }

          $jsonPath    = "${{ runner.temp }}\crash_report.json"
          $jsonEncPath = Join-Path $stagingDir "crash_report.json.gpg"
          $report | ConvertTo-Json -Depth 5 | Set-Content -Path $jsonPath -Encoding UTF8
          gpg --batch --yes --trust-model always `
              --recipient $keyId --output $jsonEncPath --encrypt $jsonPath
          Remove-Item $jsonPath -Force

          Write-Host "`nFiles staged for upload:"
          Get-ChildItem $stagingDir | ForEach-Object {
            Write-Host "  $($_.Name)  ($($_.Length) bytes)"
          }

      - name: Upload encrypted crash dumps
        if: always() && steps.check-dumps.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: crash-dumps-encrypted-${{ matrix.arch }}-${{ github.run_id }}
          path: ${{ runner.temp }}/dump-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Clean up GPG keyring
        if: always() && steps.check-dumps.outputs.found == 'true'
        shell: pwsh
        run: |
          $keyId = "${{ steps.import-key.outputs.gpg_key_id }}"
          if ($keyId) {
            gpg --batch --yes --delete-keys $keyId 2>$null
            Write-Host "GPG key $keyId removed from runner keyring."
          }

      - name: Report final status
        if: always()
        shell: pwsh
        run: |
          $buildOk = "${{ steps.build.outcome }}" -eq "success"
          $testOk  = "${{ steps.test.outcome }}"  -eq "success"

          if (-not $buildOk) {
            Write-Error "Build FAILED"
            exit 1
          }
          if (-not $testOk) {
            Write-Error "Tests FAILED"
            exit 1
          }
          Write-Host "All steps passed."