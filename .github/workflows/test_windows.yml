name: Windows [CI Test]

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.arch }} - ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'push' && !github.event.pull_request)

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: Windows 11 Arm64
            runner: windows-11-arm
          - arch: x64
            os: Windows 11
            runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja -DCMAKE_CXX_COMPILER=cl -DCMAKE_C_COMPILER=cl

      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Check dependencies
        if: always()
        run: |
          cd C:\a\rainy-toolkit\build\bin
          dumpbin /dependents rainy-toolkit-test.exe

      - name: Run tests
        run: ctest --test-dir build --output-on-failure