name: auto-version-and-sync

on:
  push:
    branches:
      - master

jobs:
  version-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto Tag with ccv
        id: ccv
        uses: smlx/ccv@v0.7.3
        with:
          tag_prefix: "v"

      - name: Update CMakeLists.txt and version.txt
        if: steps.ccv.outputs.tag != ''
        run: |
          VERSION="${{ steps.ccv.outputs.version }}"

          sed -i "s/project(MyProject VERSION [0-9.]*/project(MyProject VERSION ${VERSION}/" CMakeLists.txt
          echo "${VERSION}" > version.txt

      - name: Commit and push changes
        if: steps.ccv.outputs.tag != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add CMakeLists.txt version.txt
          git commit -m "chore: sync version to ${VERSION} [skip ci]"
          git push
          git push origin ${{ steps.ccv.outputs.tag }}