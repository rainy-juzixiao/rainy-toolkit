name: Ubuntu Linux [CI Test]

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.arch }} - ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: ubuntu 24.04 Arm64 (Noble Numbat) 
            runner: ubuntu-24.04-arm
          - arch: arm64
            os: ubuntu 22.04 Arm64 (Noble Numbat) 
            runner: ubuntu-22.04-arm
          - arch: x64
            os: ubuntu 24.04 x64 (Jammy Jellyfish) 
            runner: ubuntu-24.04
          - arch: x64
            os: ubuntu 22.04 Arm64 (Jammy Jellyfish) 
            runner: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo add-apt-repository universe
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            ca-certificates \
            pkg-config \
            software-properties-common
          sudo apt install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          sudo apt install -y \
            locales \
            locales-all \
            language-pack-en \
            language-pack-zh-hans \
            language-pack-ja \
            language-pack-fr \
            language-pack-de
          sudo locale-gen en_US.UTF-8 zh_CN.UTF-8 ja_JP.UTF-8 fr_FR.UTF-8 de_DE.UTF-8
          sudo apt install -y liburing-dev
          
          gcc --version
          g++ --version
          cmake --version

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: |
          cmake --build build -j$(nproc)

      - name: Run tests
        run: |
          ctest --test-dir build --output-on-failure
