name: Ubuntu Linux [CI Test]

permissions:
  contents: read

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  prepare-environment:
    name: Prepare Environment (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'push' && !github.event.pull_request)
    strategy:
      matrix:
        include:
          - arch: arm64
            os: ubuntu 24.04 Arm64 (Noble Numbat)
            runner: ubuntu-24.04-arm
          - arch: x64
            os: ubuntu 24.04 x64 (Noble Numbat)
            runner: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo add-apt-repository universe
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            ca-certificates \
            pkg-config \
            software-properties-common
          sudo apt install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          sudo apt install -y \
            locales \
            locales-all \
            language-pack-en \
            language-pack-zh-hans \
            language-pack-ja \
            language-pack-fr \
            language-pack-de
          sudo locale-gen en_US.UTF-8 zh_CN.UTF-8 ja_JP.UTF-8 fr_FR.UTF-8 de_DE.UTF-8
          sudo apt install -y liburing-dev
          
          gcc --version
          g++ --version
          cmake --version

      - name: Preserve environment for subsequent jobs
        uses: actions/upload-artifact@v4
        with:
          name: env-${{ matrix.runner }}
          path: |
            /usr/bin/gcc
            /usr/bin/g++
            /usr/bin/cmake
            /usr/bin/ninja
          if-no-files-found: error

  build-debug:
    name: Build Debug (${{ matrix.arch }})
    needs: prepare-environment
    runs-on: ${{ matrix.runner }}
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'push' && !github.event.pull_request)
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x64
            runner: ubuntu-24.04
    steps:
      - name: Restore environment
        uses: actions/download-artifact@v4
        with:
          name: env-${{ matrix.runner }}
          path: /usr/local/bin

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake (Debug)
        run: |
          cmake -S . -B build-debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -G Ninja

      - name: Build (Debug)
        run: |
          cmake --build build-debug -j$(nproc)

      - name: Upload Debug build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-${{ matrix.runner }}
          path: build-debug
          if-no-files-found: error

  build-release:
    name: Build Release (${{ matrix.arch }})
    needs: prepare-environment
    runs-on: ${{ matrix.runner }}
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'push' && !github.event.pull_request)
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x64
            runner: ubuntu-24.04
    steps:
      - name: Restore environment
        uses: actions/download-artifact@v4
        with:
          name: env-${{ matrix.runner }}
          path: /usr/local/bin

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake (Release)
        run: |
          cmake -S . -B build-release \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build (Release)
        run: |
          cmake --build build-release -j$(nproc)

      - name: Upload Release build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-release-${{ matrix.runner }}
          path: build-release
          if-no-files-found: error

  test:
    name: Test (${{ matrix.arch }})
    needs: [build-debug, build-release]
    runs-on: ${{ matrix.runner }}
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'push' && !github.event.pull_request)
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x64
            runner: ubuntu-24.04
    steps:
      - name: Restore Debug build
        uses: actions/download-artifact@v4
        with:
          name: build-debug-${{ matrix.runner }}
          path: build-debug

      - name: Restore Release build
        uses: actions/download-artifact@v4
        with:
          name: build-release-${{ matrix.runner }}
          path: build-release

      - name: Run tests (Debug)
        run: |
          ctest --test-dir build-debug --output-on-failure

      - name: Run tests (Release)
        run: |
          ctest --test-dir build-release --output-on-failure