name: Prepare Environment

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      arch:
        required: true
        type: string
    outputs:
      cache-key:
        description: "Cache key for the prepared environment"
        value: ${{ jobs.prepare.outputs.cache-key }}

jobs:
  prepare:
    name: Prepare ${{ inputs.arch }}
    runs-on: ${{ inputs.runner }}
    outputs:
      cache-key: ${{ steps.set-key.outputs.cache-key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo add-apt-repository universe
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            ca-certificates \
            pkg-config \
            software-properties-common \
            liburing-dev \
            liburing2
          sudo apt install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          sudo apt install -y \
            locales \
            locales-all \
            language-pack-en \
            language-pack-zh-hans \
            language-pack-ja \
            language-pack-fr \
            language-pack-de
          sudo locale-gen en_US.UTF-8 zh_CN.UTF-8 ja_JP.UTF-8 fr_FR.UTF-8 de_DE.UTF-8
          
          gcc --version
          g++ --version
          cmake --version

      - name: Set cache key
        id: set-key
        run: echo "cache-key=env-${{ inputs.runner }}-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Cache environment
        uses: actions/cache/save@v4
        with:
          path: |
            /usr/bin/gcc
            /usr/bin/g++
            /usr/bin/cmake
            /usr/bin/ninja
          key: ${{ steps.set-key.outputs.cache-key }}